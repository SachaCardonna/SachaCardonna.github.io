<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-32x32.png" sizes="32x32"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-192x192.png" sizes="192x192"/>
<link rel="manifest" href="{{ base_path }}/images/manifest.json"/>
<link rel="icon" href="/images/favicon.ico"/>
<meta name="theme-color" content="#ffffff"/>
<link rel="stylesheet" href="{{ base_path }}/assets/css/academicons.css"/>

<!-- Rotate the site's accent color on each full page load. -->
<script>
  (function () {
    var accents = ['red', 'blue', 'violet'];
    var previous = null;
    try { previous = sessionStorage.getItem('previous-accent'); } catch (error) {}
    var choices = accents.filter(function (accent) { return accent !== previous; });
    var randomIndex;
    if (window.crypto && window.crypto.getRandomValues) {
      var randomValue = new Uint32Array(1);
      window.crypto.getRandomValues(randomValue);
      randomIndex = randomValue[0] % choices.length;
    } else {
      randomIndex = Math.floor(Math.random() * choices.length);
    }
    var accent = choices[randomIndex];
    document.documentElement.setAttribute('data-accent', accent);
    try { sessionStorage.setItem('previous-accent', accent); } catch (error) {}
  }());
</script>

<!-- Support for MathJax with inline math enabled -->
<script>
  window.MathJax = {
    tex: {
      inlineMath: [['$', '$'], ['\\(', '\\)']],
      displayMath: [['$$', '$$'], ['\\[', '\\]']]
    }
  };
</script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<!-- end custom head snippets -->
